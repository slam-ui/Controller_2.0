name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: shop_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        env:
          DB_PASSWORD: password
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/shop_db
          SPRING_DATASOURCE_USERNAME: postgres
          # Фиксированный секрет для CI (Base64 от 32 байт)
          JWT_SECRET: dGVzdC1zZWNyZXQta2V5LWZvci1naXRodWItYWN0aW9ucw==
          # Тестовый профиль отключает SSL — keystore не нужен
          SPRING_PROFILES_ACTIVE: test
        run: mvn -B package --file pom.xml
